{% load static %}

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<div class="container">

    <h1>Login</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
        name="username"
        placeholder="Username">

        <input type="password"
        name="password"
        placeholder="Password">

        <button type="submit">
            Login
        </button>

    </form>

    <a href="/register/">
        Create account
    </a>

</div>
